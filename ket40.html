.brand{font-family:var(--disp);font-weight:800;font-size:17px;color:var(--cyan)}

.btn{display:block;width:100%;border:none;cursor:pointer;font-family:var(--disp);font-weight:800;font-size:18px;color:#0B1524;background:var(--cyan);border-radius:16px;padding:17px;margin-top:13px;transition:transform .08s}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}

.sortemoji{font-size:52px;text-align:center;min-height:64px;margin-top:4px}
.sortbtns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.sbtn{border:none;border-radius:16px;font-family:var(--disp);font-weight:800;font-size:19px;padding:20px 8px;cursor:pointer;transition:transform .07s}
.sbtn:active{transform:scale(.94)}
.sbtn.yes{background:#173A2E;color:var(--green);border:1.5px solid var(--green)}
.sbtn.no{background:#3A2530;color:var(--coral);border:1.5px solid var(--coral)}
/* 卡片翻面 */
.flip{perspective:1100px;margin:8px 0}
.flipinner{position:relative;transform-style:preserve-3d;transition:transform .45s;min-height:330px}
.flip.on .flipinner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.face.back{transform:rotateY(180deg)}
.cardword{font-family:var(--disp);font-weight:800;font-size:46px;text-align:center;letter-spacing:1px}
.cardword .pat{color:var(--violet)}
.cardemoji{font-size:46px;min-height:56px}
.cn{font-size:26px;font-weight:700}
.sent{font-family:Georgia,serif;font-size:18px;line-height:1.7;color:var(--ink);text-align:center;padding:0 4px}
.hintflip{color:var(--dim);font-size:13px}
.speaker{width:66px;height:66px;border-radius:50%;border:2px solid var(--cyan);background:var(--surface2);font-size:28px;cursor:pointer}
.speaker:active{transform:scale(.92)}
.speaker.sm{width:46px;height:46px;font-size:19px}
.grades{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
.gbtn{border:none;border-radius:14px;font-family:var(--disp);font-weight:800;font-size:16px;padding:16px 4px;cursor:pointer}
.gbtn:active{transform:scale(.94)}
.g-know{background:#173A2E;color:var(--green)}
.g-fuzzy{background:#3A3220;color:var(--amber)}
.g-no{background:#3A2530;color:var(--coral)}
.tag{display:inline-block;font-size:12px;font-weight:700;border-radius:999px;padding:3px 11px;margin-bottom:4px}
.tag.new{color:var(--cyan);background:rgba(59,214,242,.12)}
.tag.rev{color:var(--amber);background:rgba(255,181,71,.12)}
.combo{position:fixed;top:16%;left:50%;transform:translateX(-50%);font-family:var(--disp);font-weight:800;font-size:28px;color:var(--amber);pointer-events:none;opacity:0}
.combo.pop{animation:cpop .7s ease}

.center{text-align:center}
.result-star{font-size:52px;text-align:center;margin:8px 0}
.footer-note{text-align:center;color:var(--dim);font-size:12.5px;padding-top:8px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ================= 引擎 ================= */
let memStore={};
const DEFAULT_P={ver:1,stage:"sort",sortIdx:0,known:{},box:{},due:{},grad:{},newPtr:0,streak:0,lastDay:"",days:0};
function loadP(){try{const s=localStorage.getItem("ket40");return s?Object.assign({},DEFAULT_P,JSON.parse(s)):Object.assign({},DEFAULT_P);}catch(e){return Object.assign({},DEFAULT_P,memStore);}}
let P=loadP();
function saveP(){try{localStorage.setItem("ket40",JSON.stringify(P));}catch(e){memStore=JSON.parse(JSON.stringify(P));}}
function todayStr(){return new Date().toISOString().slice(0,10);}
function bumpStreak(){const t=todayStr();if(P.lastDay===t)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  P.streak=(P.lastDay===y)?P.streak+1:1;P.lastDay=t;P.days++;saveP();}
/* 发音 */
let VOICE=null;
function pickVoice(){const vs=speechSynthesis.getVoices();
  VOICE=vs.find(v=>v.name.includes("Samantha"))||vs.find(v=>v.lang==="en-US")||vs.find(v=>v.lang.startsWith("en"))||null;}
if("speechSynthesis" in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function say(t,rate){if(!("speechSynthesis" in window))return;
  speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);
  u.lang="en-US";if(VOICE)u.voice=VOICE;u.rate=rate||0.85;speechSynthesis.speak(u);}
/* 音效 */
let AC=null;
function beep(good){try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
  o.type=good?"triangle":"sawtooth";o.frequency.value=good?660:180;
  g.gain.setValueAtTime(.16,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.18);
  o.start();o.stop(AC.currentTime+.2);}catch(e){}}
let comboN=0;
function showCombo(){comboN++;if(comboN<3)return;const c=document.getElementById("combo");
  c.textContent=comboN+" 连击!"+(comboN>=8?" 🔥":"");c.classList.remove("pop");void c.offsetWidth;c.classList.add("pop");}
/* 拼读变色:复用拼读小任务的规律 */
const PATS=["tion","igh","ee","ea","ai","ay","oa","ow","oo","ou","ar","or","er","ir","ur","aw","oi","oy","sh","ch","th","ck","ng","all"];
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function colorize(w){
  const m=w.match(/([a-z])([bcdfghjklmnpqrstvz])e$/); // 神奇 e
  if(m&&"aiou".includes(m[1])){const i=w.length-3;
    return esc(w.slice(0,i))+'<span class="pat">'+esc(w[i])+'</span>'+esc(w[i+1])+'<span class="pat">e</span>';}
  for(const p of PATS){const i=w.indexOf(p);
    if(i>=0)return esc(w.slice(0,i))+'<span class="pat">'+esc(p)+'</span>'+esc(w.slice(i+p.length));}
  return esc(w);}
/* 渲染 */
const $=s=>document.querySelector(s);
function render(h){$("#app").innerHTML=
 '<div class="topbar"><div class="brand">🚀 KET 单词四十天</div><div class="streak">🔥 '+P.streak+' 天</div></div>'+
 '<div class="stage">'+h+'</div>';}
/* ============ 首页 ============ */
const SORT_PER_DAY=240, NEW_PER_DAY=15, REV_CAP=25;
const INTERVALS=[0,1,2,4,7]; // box1-4 的复习间隔(天);box5 毕业
function unknownIds(){const a=[];for(let i=0;i<WORDS.length;i++)if(P.known[i]===false)a.push(i);return a;}
function dueIds(){const t=todayStr(),a=[];
  for(const k in P.due)if(P.due[k]<=t&&!P.grad[k])a.push(+k);return a;}
function home(){comboN=0;
  if(P.stage==="sort"){
    const total=WORDS.length,done=P.sortIdx;
    render('<div class="card"><h1>'+(done===0?"第一步:闪电分拣 ⚡":"继续分拣")+'</h1>'+
     '<div class="sub">'+(done===0?
       "把 "+total+" 个 KET 词快速过一遍:认识的划走,不认识的进入学习池。凭直觉,每个词 2 秒,别纠结!":
       "已分拣 "+done+"/"+total+",学习池已有 "+unknownIds().length+" 个词。")+'</div>'+
     '<div class="pbar"><i style="width:'+(done/total*100)+'%"></i></div>'+
     '<button class="btn" onclick="sortRun()">'+(done===0?"开始分拣":"继续 (约10分钟)")+'</button>'+
     '<button class="btn ghost" onclick="say(\'Hello! Ready for KET words?\')">🔊 试试发音</button></div>'+
     '<div class="footer-note">分拣预计 3 天完成 · 之后每天 15 个新词 · v3</div>');return;}
  if(P.stage==="learn"){
    const un=unknownIds(),due=dueIds();
    const newLeft=un.filter(i=>!(i in P.box)).length;
    const grad=Object.keys(P.grad).length;
    if(newLeft===0&&due.length===0){P.stage="done";saveP();return home();}
    render('<div class="card"><h1>第 '+(P.days+1)+' 天任务</h1>'+
     '<div class="sub">今日:复习 '+Math.min(due.length,REV_CAP)+' 个到期词 + '+Math.min(newLeft,NEW_PER_DAY)+' 个新词。翻卡前先想意思,再自评。</div>'+
     '<div class="stats"><div class="stat"><b>'+un.length+'</b><span>学习池</span></div>'+
     '<div class="stat"><b>'+grad+'</b><span>已毕业 🎓</span></div>'+
     '<div class="stat"><b>'+Math.ceil(newLeft/NEW_PER_DAY)+'</b><span>预计剩余天数</span></div></div>'+
     '<button class="btn" onclick="learnRun()">开始今日任务 (10分钟)</button></div>'+
     '<div class="footer-note">认识→间隔拉长 · 不认识→明天再见 · 连续 5 次认识即毕业 · v3</div>');return;}
  render('<div class="card center"><div class="result-star">🏆</div><h1>学习池清空,全部毕业!</h1>'+
   '<div class="sub">'+Object.keys(P.grad).length+' 个 KET 生词全部拿下,用时 '+P.days+' 天。<br>之后偶尔回来点下面的按钮抽查即可。</div>'+
   '<button class="btn" onclick="finalReview()">随机抽查 20 词</button></div>');}
/* ============ 分拣 ============ */
function sortRun(){beep(true);sortOne(0);}
function sortOne(count){
  if(P.sortIdx>=WORDS.length){P.stage="learn";bumpStreak();saveP();
    return render('<div class="card center"><div class="result-star">✨</div><h1>分拣全部完成!</h1>'+
     '<div class="sub">学习池共 <b>'+unknownIds().length+'</b> 个生词。明天开始每天 15 个,预计 '+Math.ceil(unknownIds().length/NEW_PER_DAY)+' 天学完。</div>'+
     '<button class="btn" onclick="home()">回首页</button></div>');}
  if(count>=SORT_PER_DAY){bumpStreak();saveP();
    return render('<div class="card center"><div class="result-star">🌟</div><h1>今日分拣完成!</h1>'+
     '<div class="sub">已分拣 '+P.sortIdx+'/'+WORDS.length+',学习池 '+unknownIds().length+' 词。明天继续!</div>'+
     '<button class="btn" onclick="home()">回首页</button></div>');}
  const i=P.sortIdx,w=WORDS[i];
  render('<div class="card"><div class="sub center">认识它吗?凭直觉,2 秒内选 ('+(P.sortIdx+1)+'/'+WORDS.length+')</div>'+
   '<div class="sortemoji">'+(w.e||"")+'</div>'+
   '<div class="sortword">'+colorize(w.w)+'</div>'+
   '<div class="center" style="margin-top:6px"><button class="speaker sm" onclick="say(\''+w.w+'\')">🔊</button></div>'+
   '<div class="sortbtns"><button class="sbtn yes" id="by">😀 认识</button><button class="sbtn no" id="bn">🆕 不认识</button></div></div>');
  say(w.w);
  $("#by").onclick=()=>{P.known[i]=true;P.sortIdx++;beep(true);showCombo();saveP();sortOne(count+1);};
  $("#bn").onclick=()=>{P.known[i]=false;P.sortIdx++;beep(true);comboN=0;saveP();sortOne(count+1);};}
/* ============ 学习 ============ */
function learnRun(){beep(true);
  const due=dueIds().slice(0,REV_CAP);
  const fresh=unknownIds().filter(i=>!(i in P.box)).slice(0,NEW_PER_DAY);
  const queue=due.map(i=>({i,isNew:false})).concat(fresh.map(i=>({i,isNew:true})));
  if(queue.length===0){bumpStreak();return home();}
  cardStep(queue,0,0);}
function cardStep(queue,idx,got){
  if(idx>=queue.length){bumpStreak();saveP();
    return render('<div class="card center"><div class="result-star">🌟</div><h1>今日任务完成!</h1>'+
     '<div class="sub">过了 '+queue.length+' 张卡,自评"认识" '+got+' 张。<br>连续学习 🔥 '+P.streak+' 天,明天见!</div>'+
     '<button class="btn" onclick="home()">回首页</button></div>');}
  const q=queue[idx],w=WORDS[q.i];
  render('<div class="sub center" style="padding-bottom:4px">'+(idx+1)+' / '+queue.length+'</div>'+
   '<div class="flip" id="flip"><div class="flipinner">'+
   '<div class="face"><span class="tag '+(q.isNew?"new":"rev")+'">'+(q.isNew?"新词":"复习")+'</span>'+
   '<div class="cardemoji">'+(w.e||"")+'</div>'+
   '<div class="cardword">'+colorize(w.w)+'</div>'+
   '<button class="speaker" onclick="event.stopPropagation();say(\''+w.w+'\')">🔊</button>'+
   '<div class="hintflip">先想想意思 · 点卡片翻面</div></div>'+
   '<div class="face back"><div class="cn">'+esc(w.c)+'</div>'+
   '<div class="cardword" style="font-size:30px">'+colorize(w.w)+'</div>'+
   '<div class="sent">'+esc(w.s)+'</div>'+
   '<button class="speaker sm" onclick="event.stopPropagation();say(\''+w.s.replace(/'/g,"")+'\',0.95)">🔊 听整句</button></div>'+
   '</div></div>'+
   '<div class="grades" id="grades" style="visibility:hidden">'+
   '<button class="gbtn g-know">😀 认识</button><button class="gbtn g-fuzzy">🤔 模糊</button><button class="gbtn g-no">😵 不认识</button></div>');
  say(w.w);
  const flip=$("#flip");
  flip.onclick=()=>{flip.classList.add("on");$("#grades").style.visibility="visible";};
  const box=P.box[q.i]||0;
  document.querySelector(".g-know").onclick=()=>{grade(q.i,Math.min(box+1,5));beep(true);showCombo();cardStep(queue,idx+1,got+1);};
  document.querySelector(".g-fuzzy").onclick=()=>{grade(q.i,Math.max(box,1));beep(true);comboN=0;cardStep(queue,idx+1,got);};
  document.querySelector(".g-no").onclick=()=>{grade(q.i,1);beep(false);comboN=0;cardStep(queue,idx+1,got);};}
function grade(i,box){P.box[i]=box;
  if(box>=5){P.grad[i]=true;delete P.due[i];}
  else{const d=new Date(Date.now()+INTERVALS[box]*864e5).toISOString().slice(0,10);P.due[i]=d;}
  saveP();}
function finalReview(){const g=Object.keys(P.grad);
  const pickN=[];const pool=g.slice();
  while(pickN.length<Math.min(20,pool.length)){pickN.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);}
  cardStep(pickN.map(i=>({i:+i,isNew:false})),0,0);}
window.addEventListener("load",home);
</script>
</body>
